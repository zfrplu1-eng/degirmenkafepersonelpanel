<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ayarları - Hammadde &amp; Ürün Editörü</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10.1">
    <script>
        if(!localStorage.getItem("theme_reset_orbai")){localStorage.setItem("theme","dark");localStorage.setItem("theme_reset_orbai","true")}document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
    <style>
        .category-tab {
            width: 100%;
            text-align: left;
            padding: 12px 18px;
            border-radius: 12px;
            border: 2px solid #cbd5e1;
            cursor: pointer;
            font-weight: 800;
            font-size: 12px;
            margin-bottom: 8px;
            background: #f8fafc;
            color: #334155;
            transition: all 0.2s ease;
        }
        .category-tab.active {
            background: #1B2E58 !important;
            color: #ffffff !important;
            border-color: #1B2E58 !important;
        }
        /* 🔄 Görseldeki Yuvarlak Geri Dönüş Butonu */
        .round-back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--form-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            cursor: pointer;
        }

        .round-back-btn:hover {
            background: var(--accent) !important;
            color: #ffffff !important;
            border-color: var(--accent) !important;
            box-shadow: 0 8px 22px var(--accent-glow) !important;
            transform: scale(1.05);
        }

        /* 🚀 Premium Modül Başlık ve Alt Başlık Stilleri */
        .module-main-title {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif !important;
            font-size: 2.8rem !important;
            font-weight: 800 !important;
            letter-spacing: -0.045em !important;
            line-height: 1.15 !important;
            color: #ffffff !important;
            text-align: center !important;
            margin-bottom: 8px !important;
        }

        .module-main-subtitle {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif !important;
            font-size: 1rem !important;
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500 !important;
            letter-spacing: -0.015em !important;
            line-height: 1.5 !important;
            max-width: 600px !important;
            margin-left: auto !important;
            margin-right: auto !important;
            text-align: center !important;
        }

        /* Aydınlık Modda Yazıları Koyu Renk Yapar */
        [data-theme="light"] .module-main-title {
            color: #0f172a !important;
        }
        [data-theme="light"] .module-main-subtitle {
            color: #475569 !important;
        }
    </style>
</head>
<body class="setup-sub-body">

    <div class="setup-container-box" style="max-width: 1200px; min-height: auto; padding: 25px; margin: 20px auto;">
        
        <!-- 🔄 Görseldeki Premium Layout Düzeni -->
        <header class="setup-subview-header" style="display: flex; flex-direction: column; gap: 30px; margin-bottom: 40px; border-bottom: 1.5px solid rgba(0,0,0,0.05); padding-bottom: 30px; width: 100%;">
            
            <!-- Üst Satır: Sol Köşede Yuvarlak Geri Butonu, Sağ Köşede Etiket -->
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                
                <!-- Sol Köşe: Yuvarlak Geri Dön Butonu -->
                <a href="setup.html" class="round-back-btn" aria-label="Geri Dön">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                
                <!-- Sağ Köşe: Kategori Mor Etiketi -->
                <span class="text-xs uppercase font-extrabold tracking-widest text-purple-400 font-['Outfit']" style="font-size: 11px; letter-spacing: 0.1em; color: #a855f7; font-weight: 800;">HAMMADDE AYARLARI</span>
            </div>

            <!-- Alt Satır: Ortalanmış Premium Kalın Başlık & Açıklama -->
            <div class="text-center" style="margin-top: 10px; width: 100%;">
                <h1 class="module-main-title" style="margin: 0; font-size: 2.8rem; font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--text-primary);">Hammadde &amp; Ürün Editörü</h1>
                <p class="module-main-subtitle" style="margin: 10px auto 0 auto; color: var(--text-secondary); font-size: 1rem; max-w: 600px; line-height: 1.5;">Kafe menüsünde bulunan şuruplar, kahveler, soslar ve diğer hammadde listesini ekleyin, silin ve stok kurallarını yönetin.</p>
            </div>
            
            <!-- Aksiyon Butonu: Yeni Hammadde Ekle (Ortalanmış) -->
            <div style="display: flex; justify-content: center; width: 100%; margin-top: 5px;">
                <button class="button2" id="btn-open-add-modal" style="margin: 0; font-weight: 800; background: var(--accent); color: #fff; border-radius: 12px; display: flex; align-items: center; gap: 6px; padding: 12px 24px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span>Yeni Hammadde Ekle</span>
                </button>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 260px 1fr; gap: 30px;">
            <!-- Sol: Kategori Filtreleme -->
            <div style="border-right: 1.5px solid rgba(129, 79, 255, 0.1); padding-right: 20px;">
                <label style="font-size: 11px; font-weight: 900; color: var(--text-secondary); display: block; margin-bottom: 12px; letter-spacing: 0.5px;">KATEGORİ FİLTRESİ</label>
                <div id="setup-categories-list" style="display: flex; flex-direction: column; gap: 6px;">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>

            <!-- Sağ: Hammadde Listesi ve Yönetim Butonları -->
            <div style="background: var(--card-bg); border: 1px solid rgba(129, 79, 255, 0.1); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(129, 79, 255, 0.1); padding-bottom: 10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <h4 style="margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 900; color: var(--text-primary); font-size: 15px;" id="setup-active-category-title">Tüm Hammaddeler</h4>
                </div>
                
                <div style="max-height: 520px; overflow-y: auto; border: 1px solid rgba(129, 79, 255, 0.08); border-radius: 16px;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="background: rgba(129, 79, 255, 0.03); border-bottom: 2px solid rgba(129, 79, 255, 0.08); font-size: 11px; font-weight: 900; color: var(--text-secondary);">
                                <th style="padding: 14px 16px;">HAMMADDE ADI</th>
                                <th style="padding: 14px 16px; width: 140px; text-align: center;">BİRİM/AĞIRLIK</th>
                                <th style="padding: 14px 16px; width: 140px; text-align: center;">KRİTİK LİMİT</th>
                                <th style="padding: 14px 16px; width: 120px; text-align: center;">İŞLEMLER</th>
                            </tr>
                        </thead>
                        <tbody id="setup-materials-table-body">
                            <!-- JS ile doldurulacak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Yeni Hammadde Ekleme -->
    <div id="add-material-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000;">
        <div class="auth-card" style="width: 450px; padding: 30px; border-radius: 24px; margin: 0; border: 1px solid rgba(129, 79, 255, 0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
            <div style="display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(129, 79, 255, 0.1); padding-bottom: 10px; margin-bottom: 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <h3 style="margin:0; font-weight: 800; font-size: 1.15rem; color: var(--text-primary);">Yeni Hammadde Ekle</h3>
            </div>
            
            <form id="add-material-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); display: block; margin-bottom: 6px;">HAMMADDE ADI</label>
                    <input type="text" id="new-material-name" class="setting-input" style="width: 100%;" placeholder="Örn: HM-ÇİLEK AROMALI ŞURUP" required>
                </div>

                <div>
                    <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); display: block; margin-bottom: 6px;">KATEGORİ SEÇİN VEYA YENİ YAZIN</label>
                    <select id="new-material-category" class="setting-select" style="width: 100%; margin-bottom: 8px;">
                        <!-- JS ile doldurulacak -->
                    </select>
                    <input type="text" id="new-material-custom-category" class="setting-input" style="width: 100%;" placeholder="Veya Yeni Kategori Adı Yazın...">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); display: block; margin-bottom: 6px;">BİRİM/AĞIRLIK (L/Kg)</label>
                        <input type="number" id="new-material-weight" class="setting-input" style="width: 100%;" step="0.001" placeholder="0.900" required>
                    </div>
                    <div>
                        <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); display: block; margin-bottom: 6px;">KRİTİK LİMİT</label>
                        <input type="number" id="new-material-limit" class="setting-input" style="width: 100%;" placeholder="5" required>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px;">
                    <button type="button" class="button1" id="btn-close-add-modal" style="margin:0; border-radius: 10px;">Vazgeç</button>
                    <button type="submit" class="button2" style="margin:0; font-weight:800; border-radius: 10px; display: flex; align-items: center; gap: 6px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        <span>Ekle</span>
                    </button>
                </div>
            </form>
    </div>

    <!-- Scriptler -->
    <script src="toast.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("systemAuth") !== "1908") {
                window.location.href = "setup.html";
                return;
            }

            let flatMaterialsList = [];
            let materialsData = {}; // Kategori bazlı gruplu
            let activeCategory = "";

            const tableBody = document.getElementById("setup-materials-table-body");
            const categoriesListEl = document.getElementById("setup-categories-list");
            const activeTitle = document.getElementById("setup-active-category-title");

            const addModal = document.getElementById("add-material-modal");
            const btnOpenAddModal = document.getElementById("btn-open-add-modal");
            const btnCloseAddModal = document.getElementById("btn-close-add-modal");
            const addForm = document.getElementById("add-material-form");
            const selectCategoryEl = document.getElementById("new-material-category");

            // 1. Verileri sunucudan çek
            function loadMaterials() {
                fetch("/api/products?t=" + Date.now())
                    .then(res => res.json())
                    .then(data => {
                        flatMaterialsList = data || [];
                        
                        // Verileri kategoriye göre grupla
                        materialsData = {};
                        flatMaterialsList.forEach(item => {
                            const cat = item.category || "DİÄ�ER ÜRÜNLER";
                            if (!materialsData[cat]) materialsData[cat] = [];
                            materialsData[cat].push(item);
                        });

                        const categories = Object.keys(materialsData);
                        if (categories.length > 0) {
                            if (!activeCategory || !categories.includes(activeCategory)) {
                                activeCategory = categories[0];
                            }
                        }

                        buildCategories();
                        renderMaterialsTable();
                        buildSelectCategories();
                    })
                    .catch(err => {
                        console.error("Hammaddeler yüklenirken hata:", err);
                        tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#ef4444; font-weight:800;">Veri yükleme hatası! Lütfen sayfayı yenileyin.</td></tr>`;
                    });
            }

            // Kategori Listesini Sol Bölüme Çiz
            function buildCategories() {
                categoriesListEl.innerHTML = "";
                const categories = Object.keys(materialsData);

                categories.forEach(cat => {
                    const btn = document.createElement("button");
                    btn.className = `category-tab ${cat === activeCategory ? "active" : ""}`;
                    btn.textContent = cat;
                    btn.addEventListener("click", () => {
                        activeCategory = cat;
                        buildCategories();
                        renderMaterialsTable();
                    });
                    categoriesListEl.appendChild(btn);
                });
            }

            // Hammaddeleri Tabloya Dök
            function renderMaterialsTable() {
                tableBody.innerHTML = "";
                activeTitle.textContent = `${activeCategory} STOK KONTROLÜ`;

                const items = materialsData[activeCategory] || [];
                if (items.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">Bu kategoride hammadde bulunmuyor.</td></tr>`;
                    return;
                }

                items.forEach(item => {
                    const tr = document.createElement("tr");
                    tr.style.borderBottom = "1px solid rgba(0,0,0,0.05)";
                    
                    const wVal = parseFloat(item.weight) || 0.900;
                    const lVal = parseInt(item.limit) || 5;

                    tr.innerHTML = `
                        <td style="padding:12px; font-size:12px; font-weight:700; color:#334155;">${item.name}</td>
                        <td style="padding:12px; text-align:center; font-size:12px; font-weight:600;">${wVal.toFixed(3)}</td>
                        <td style="padding:12px; text-align:center; font-size:12px; font-weight:600;">${lVal}</td>
                        <td style="padding:12px; text-align:center;">
                            <button class="button1 delete-material-btn" data-id="${item.id}" style="padding:6px 12px; font-size:11px; margin:0; border-radius:6px; background:#ef4444; color:#fff; font-weight:800; border:none; cursor:pointer;">Sil</button>
                        </td>
                    `;

                    tr.querySelector(".delete-material-btn").addEventListener("click", () => {
                        deleteMaterial(item.id);
                    });

                    tableBody.appendChild(tr);
                });
            }

            // Ekleme Modal Seçenekleri
            function buildSelectCategories() {
                selectCategoryEl.innerHTML = "";
                const categories = Object.keys(materialsData);
                categories.forEach(cat => {
                    const opt = document.createElement("option");
                    opt.value = cat;
                    opt.textContent = cat;
                    selectCategoryEl.appendChild(opt);
                });
            }

            // Hammadde Silme İstek Gönderimi
            function deleteMaterial(id) {
                if (confirm("Seçili hammaddeyi sistemden kalıcı olarak silmek istediğinize emin misiniz?")) {
                    fetch(`/api/products/${id}`, {
                        method: "DELETE"
                    })
                    .then(res => res.json())
                    .then(result => {
                        if (result.success) {
                            // Arayüz tasarımındaki görsel eşleşmesini de temizle
                            let localImages = JSON.parse(localStorage.getItem("kafe_product_images") || "{}");
                            const pId = id.toLowerCase().replace(/\s+/g, "_");
                            if (localImages[pId]) {
                                delete localImages[pId];
                                localStorage.setItem("kafe_product_images", JSON.stringify(localImages));
                            }
                            
                            alert("âœ… Hammadde başarıyla silindi!");
                            loadMaterials();
                        } else {
                            alert("Hata: Hammadde silinemedi.");
                        }
                    })
                    .catch(err => console.error("Hata:", err));
                }
            }

            // Modal Kontrolleri
            btnOpenAddModal.addEventListener("click", () => addModal.style.display = "flex");
            btnCloseAddModal.addEventListener("click", () => addModal.style.display = "none");

            // Yeni Hammadde Ekleme Formu
            addForm.addEventListener("submit", (e) => {
                e.preventDefault();

                const name = document.getElementById("new-material-name").value;
                const customCat = document.getElementById("new-material-custom-category").value.trim();
                const category = customCat ? customCat.toUpperCase() : selectCategoryEl.value;
                const weight = parseFloat(document.getElementById("new-material-weight").value);
                const limit = parseInt(document.getElementById("new-material-limit").value);
                const id = name.toLowerCase().replace(/\s+/g, "_");

                const newMaterial = { id, name, category, weight, limit, stock: 10, expiry: "Belirtilmedi" };

                fetch("/api/products", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newMaterial)
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        alert("âœ… Yeni hammadde başarıyla eklendi!");
                        addModal.style.display = "none";
                        addForm.reset();
                        loadMaterials();
                    } else {
                        alert("Hata: Hammadde eklenemedi. (Aynı isimde olabilir)");
                    }
                })
                .catch(err => console.error("Ekleme hatası:", err));
            });

            loadMaterials();
        });
    </script>
</body>
</html>
