<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Değirmen Kafe Yönetim Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10.1">
    <style>
        :root {
            --bg-color: #060913;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(10, 14, 26, 0.7);
        }
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --border-color: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(255, 255, 255, 0.85);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            transition: background 0.3s;
        }

        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            display: none; /* Giriş yapılana kadar gizli */
        }

        /* 🎵 Global Glassmorphic Çalma Listesi Müzik Oynatıcı */
        #global-music-player-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            width: calc(100% - 48px);
            max-width: 700px;
            z-index: 99999;
            background: rgba(10, 14, 26, 0.75);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: none; /* Giriş yapılana kadar gizli */
        }

        [data-theme="light"] #global-music-player-bar {
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
        }

        .music-info-text {
            color: #ffffff;
        }
        [data-theme="light"] .music-info-text {
            color: #0f172a;
        }

        .music-sub-text {
            color: rgba(255,255,255,0.5);
        }
        [data-theme="light"] .music-sub-text {
            color: rgba(15, 23, 42, 0.6);
        }

        .btn-toggle-play {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: 99px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        [data-theme="light"] .btn-toggle-play {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }

        .btn-toggle-play:hover {
            background: rgba(255,255,255,0.15);
        }
        [data-theme="light"] .btn-toggle-play:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="login-body-bg">

    <!-- Güneş / Ay Tema Değiştirici Buton -->
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Temayı Değiştir">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
    </button>

    <!-- Giriş Formu Konteynırı -->
    <div class="login-container" id="login-container-box">
        <div class="role-selector">
            <button type="button" class="role-tab active" data-role="yönetici">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Yönetici
            </button>
            <button type="button" class="role-tab" data-role="personel">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Personel
            </button>
            <div class="role-slider"></div>
        </div>

        <form class="form" id="login-form">
            <input type="hidden" id="selected-role" value="yönetici">
            <p id="heading">Hoş Geldiniz</p>

            <div class="field">
                <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
                <input type="text" id="username" class="input-field" placeholder="Kullanıcı Adı" required autocomplete="off">
            </div>

            <div class="field">
                <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
                <input type="password" id="password" class="input-field" placeholder="Şifre" required>
            </div>

            <div class="btn">
                <button type="button" class="button1" id="btn-signup">Kayıt Ol</button>
                <button type="submit" class="button2" id="btn-login">Giriş Yap</button>
            </div>

            <button type="button" class="button3" id="btn-forgot-password">Şifremi Unuttum?</button>
        </form>
    </div>

    <!-- İç Sayfa Yükleyici -->
    <iframe id="content-frame" name="content-frame" src="about:blank"></iframe>

    <!-- Global Müzik Oynatıcısı -->
    <div id="global-music-player-bar">
        <div class="player-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #814fff 0%, #ff5c35 100%); display: flex; align-items: center; justify-content: center; animation: spin 5s linear infinite; box-shadow: 0 4px 15px rgba(129, 79, 255, 0.3);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </div>
                <div>
                    <span class="music-info-text" id="global-playing-title" style="font-size: 13px; font-weight: 800; display: block; letter-spacing: 0.2px;">Müzik Sistemi</span>
                    <span class="music-sub-text" style="font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Playlist Çalar</span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="toggleGlobalMusicBar()" id="btn-toggle-global-music" class="btn-toggle-play">
                    <span id="global-toggle-music-text">Müzik Çaları Aç</span>
                </button>
            </div>
        </div>
        <div id="global-music-iframe-wrapper" style="height: 0px; overflow: hidden; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05);">
            <div id="global-youtube-placeholder" style="width: 100%; height: 200px;"></div>
        </div>
    </div>

    <script src="app.js?v=10.1"></script>
    <script>
        let isGlobalMusicOpen = false;
        
        function toggleGlobalMusicBar() {
            const wrapper = document.getElementById("global-music-iframe-wrapper");
            const btn = document.getElementById("global-toggle-music-text");
            if (wrapper && btn) {
                if (!isGlobalMusicOpen) {
                    wrapper.style.height = "200px";
                    btn.textContent = "Müzik Çaları Kapat";
                    isGlobalMusicOpen = true;
                } else {
                    wrapper.style.height = "0px";
                    btn.textContent = "Müzik Çaları Aç";
                    isGlobalMusicOpen = false;
                }
            }
        }

        // Temayı iframe'den gelen uyarılara göre senkronize et
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "THEME_CHANGE") {
                document.documentElement.setAttribute("data-theme", event.data.theme);
            }
            if (event.data && event.data.type === "LOGOUT") {
                localStorage.removeItem("user");
                document.getElementById("content-frame").style.display = "none";
                document.getElementById("content-frame").src = "about:blank";
                document.getElementById("global-music-player-bar").style.display = "none";
                document.getElementById("login-container-box").style.display = "block";
                document.body.className = "login-body-bg";
            }
        });

        function loadGlobalMusic() {
            fetch('/api/settings/music')
                .then(res => res.json())
                .then(data => {
                    const embedPlaceholder = document.getElementById("global-youtube-placeholder");
                    if (data.youtubePlaylist) {
                        const playlistVal = data.youtubePlaylist.trim();
                        let embedUrl = playlistVal;

                        if (!playlistVal.startsWith("<iframe")) {
                            let playlistId = "";
                            const reg = /[&?]list=([^&]+)/;
                            const match = playlistVal.match(reg);
                            if (match && match[1]) {
                                playlistId = match[1];
                            } else if (!playlistVal.includes("/") && playlistVal.length > 10) {
                                playlistId = playlistVal;
                            }

                            if (playlistId) {
                                embedUrl = `https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=0&enablejsapi=1`;
                            }
                            embedPlaceholder.innerHTML = `<iframe width="100%" height="200" src="${embedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="border: none;"></iframe>`;
                        } else {
                            embedPlaceholder.innerHTML = playlistVal;
                        }
                    }
                })
                .catch(err => console.error("Müzik yükleme hatası:", err));
        }

        // Oturum kontrolü
        document.addEventListener("DOMContentLoaded", () => {
            const user = localStorage.getItem("user");
            if (user) {
                // Giriş yapılmışsa doğrudan iframe yükle
                document.getElementById("login-container-box").style.display = "none";
                document.body.className = "";
                const frame = document.getElementById("content-frame");
                frame.style.display = "block";
                frame.src = "dashboard.html";
                document.getElementById("global-music-player-bar").style.display = "block";
                loadGlobalMusic();
            }
        });
    </script>
</body>
</html>
