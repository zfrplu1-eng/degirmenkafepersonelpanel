    <link rel="stylesheet" href="style.css?v=10.1">
    <style>
        /* 🔄 Görseldeki Yuvarlak Geri Dönüş Butonu */
        .round-back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--form-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            cursor: pointer;
        }

        .round-back-btn:hover {
            background: var(--accent) !important;
            color: #ffffff !important;
            border-color: var(--accent) !important;
            box-shadow: 0 8px 22px var(--accent-glow) !important;
            transform: scale(1.05);
        }

        /* 🚀 Premium Modül Başlık ve Alt Başlık Stilleri */
        .module-main-title {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif !important;
            font-size: 2.8rem !important;
            font-weight: 800 !important;
            letter-spacing: -0.045em !important;
            line-height: 1.15 !important;
            color: #ffffff !important;
            text-align: center !important;
            margin-bottom: 8px !important;
        }

        .module-main-subtitle {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif !important;
            font-size: 1rem !important;
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500 !important;
            letter-spacing: -0.015em !important;
            line-height: 1.5 !important;
            max-width: 600px !important;
            margin-left: auto !important;
            margin-right: auto !important;
            text-align: center !important;
        }

        /* Aydınlık Modda Yazıları Koyu Renk Yapar */
        [data-theme="light"] .module-main-title {
            color: #0f172a !important;
        }
        [data-theme="light"] .module-main-subtitle {
            color: #475569 !important;
        }
    </style>
    <script>
        if(!localStorage.getItem("theme_reset_orbai")){localStorage.setItem("theme","dark");localStorage.setItem("theme_reset_orbai","true")}document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
</head>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("systemAuth") !== "1908") {
                window.location.href = "setup.html";
                return;
            }

            // Tema Değişimi Dinleyicisi
            window.addEventListener("storage", (e) => {
                if (e.key === "theme") {
                    document.documentElement.setAttribute("data-theme", e.newValue || "dark");
                }
            });

            const setupSlideSelect = document.getElementById("setup-slide-select");
            const setupSlideDetailForm = document.getElementById("setup-slide-detail-form");
            const setupSlideTitleInput = document.getElementById("setup-slide-title");
            const setupSlideTextAlignSelect = document.getElementById("setup-slide-text-align");

            // Title Font Settings
            const setupSlideTitleFontFamily = document.getElementById("setup-slide-title-font-family");
            const setupSlideTitleFontSize = document.getElementById("setup-slide-title-font-size");
            const setupSlideTitleFontWeight = document.getElementById("setup-slide-title-font-weight");
            const setupSlideTitleColor = document.getElementById("setup-slide-title-color");

            // Desc 1
            const setupSlideDescInput = document.getElementById("setup-slide-desc");
            const setupSlideDescFontFamily = document.getElementById("setup-slide-desc-font-family");
            const setupSlideDescFontSize = document.getElementById("setup-slide-desc-font-size");
            const setupSlideDescFontWeight = document.getElementById("setup-slide-desc-font-weight");
            const setupSlideDescColor = document.getElementById("setup-slide-desc-color");

            // Desc 2
            const setupSlideDesc2Input = document.getElementById("setup-slide-desc2");
            const setupSlideDesc2FontFamily = document.getElementById("setup-slide-desc2-font-family");
            const setupSlideDesc2FontSize = document.getElementById("setup-slide-desc2-font-size");
            const setupSlideDesc2FontWeight = document.getElementById("setup-slide-desc2-font-weight");
            const setupSlideDesc2Color = document.getElementById("setup-slide-desc2-color");

            const setupSlideVideoFileInput = document.getElementById("setup-slide-video-file");
            const btnTriggerVideoUpload = document.getElementById("btn-trigger-video-upload");
            const uploadStatusText = document.getElementById("upload-status-text");
            const setupSlideVideoUrlInput = document.getElementById("setup-slide-video-url");
            const setupSlideVideoFitSelect = document.getElementById("setup-slide-video-fit");

            const btnSaveSlideSetup = document.getElementById("btn-save-slide-setup");
            const btnAddNewSlide = document.getElementById("btn-add-new-slide");
            const btnDeleteSlide = document.getElementById("btn-delete-slide");

            let systemSlidesData = [];
            let selectedSlideIdx = -1;

            function loadSystemSlides() {
                fetch("/api/slides")
                    .then(res => res.json())
                    .then(slides => {
                        systemSlidesData = slides;
                        populateSlideDropdown();
                        setupSlideDetailForm.classList.add("hidden");
                        selectedSlideIdx = -1;
                    })
                    .catch(err => console.error("Slayt yükleme hatası:", err));
            }

            function populateSlideDropdown() {
                setupSlideSelect.innerHTML = `<option value="">Düzenlenecek Slayt Seç...</option>`;
                systemSlidesData.forEach((slide, idx) => {
                    const opt = document.createElement("option");
                    opt.value = idx;
                    opt.textContent = slide.title || `Slayt #${idx + 1}`;
                    setupSlideSelect.appendChild(opt);
                });
            }

            setupSlideSelect.addEventListener("change", (e) => {
                const val = e.target.value;
                if (val === "") {
                    setupSlideDetailForm.classList.add("hidden");
                    selectedSlideIdx = -1;
                    return;
                }
                selectedSlideIdx = parseInt(val);
                loadSlideForm(systemSlidesData[selectedSlideIdx]);
            });

            function loadSlideForm(slide) {
                setupSlideDetailForm.classList.remove("hidden");
                setupSlideTitleInput.value = slide.title || "";
                setupSlideTextAlignSelect.value = slide.titleAlign || "left";

                // Title Fonts
                setupSlideTitleFontFamily.value = slide.titleFontFamily || "Inter";
                setupSlideTitleFontSize.value = slide.titleFontSize || 38;
                setupSlideTitleFontWeight.value = slide.titleFontWeight || "900";
                setupSlideTitleColor.value = slide.titleColor || "#ffffff";
                
                // Desc 1
                setupSlideDescInput.value = slide.desc || "";
                setupSlideDescFontFamily.value = slide.descFontFamily || "Inter";
                setupSlideDescFontSize.value = slide.descFontSize || 13;
                setupSlideDescFontWeight.value = slide.descFontWeight || "400";
                setupSlideDescColor.value = slide.descColor || "#ffffff";

                // Desc 2
                setupSlideDesc2Input.value = slide.desc2 || "";
                setupSlideDesc2FontFamily.value = slide.desc2FontFamily || "Inter";
                setupSlideDesc2FontSize.value = slide.desc2FontSize || 12;
                setupSlideDesc2FontWeight.value = slide.desc2FontWeight || "400";
                setupSlideDesc2Color.value = slide.desc2Color || "#ffffff";

                setupSlideVideoUrlInput.value = slide.video || "";
                setupSlideVideoFitSelect.value = slide.videoFit || "cover";
                uploadStatusText.textContent = "Değiştirilmedi";
            }

            btnTriggerVideoUpload.addEventListener("click", () => {
                setupSlideVideoFileInput.click();
            });

            setupSlideVideoFileInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;

                uploadStatusText.textContent = "Yükleniyor...";
                const formData = new FormData();
                formData.append("video", file);

                fetch("/api/upload-video", {
                    method: "POST",
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        setupSlideVideoUrlInput.value = data.fileUrl;
                        uploadStatusText.textContent = "Yüklendi âœ”â€�";
                    } else {
                        alert(data.message);
                        uploadStatusText.textContent = "Hata âÂ�Å’";
                    }
                })
                .catch(err => {
                    console.error(err);
                    uploadStatusText.textContent = "Hata âÂ�Å’";
                });
            });

            btnAddNewSlide.addEventListener("click", () => {
                const newSlide = {
                    title: "Yeni Slayt",
                    titleAlign: "left",
                    titleFontFamily: "Inter",
                    titleFontSize: 38,
                    titleFontWeight: "900",
                    titleColor: "#ffffff",
                    desc: "Açıklama 1 metni.",
                    descFontFamily: "Inter",
                    descFontSize: 13,
                    descFontWeight: "400",
                    descColor: "#ffffff",
                    desc2: "Açıklama 2 metni.",
                    desc2FontFamily: "Inter",
                    desc2FontSize: 12,
                    desc2FontWeight: "400",
                    desc2Color: "#ffffff",
                    video: "",
                    videoFit: "cover"
                };
                systemSlidesData.push(newSlide);
                populateSlideDropdown();
                setupSlideSelect.value = systemSlidesData.length - 1;
                selectedSlideIdx = systemSlidesData.length - 1;
                loadSlideForm(newSlide);
            });

            btnDeleteSlide.addEventListener("click", () => {
                if (selectedSlideIdx === -1) return;
                if (!confirm("Bu slaytı silmek istediğinize emin misiniz?")) return;

                systemSlidesData.splice(selectedSlideIdx, 1);
                saveSystemSlides(() => {
                    loadSystemSlides();
                    alert("Slayt silindi.");
                });
            });

            btnSaveSlideSetup.addEventListener("click", () => {
                if (selectedSlideIdx === -1) return;

                const title = setupSlideTitleInput.value.trim();
                const titleAlign = setupSlideTextAlignSelect.value;
                const titleFontFamily = setupSlideTitleFontFamily.value;
                const titleFontSize = parseInt(setupSlideTitleFontSize.value) || 38;
                const titleFontWeight = setupSlideTitleFontWeight.value;
                const titleColor = setupSlideTitleColor.value || "#ffffff";

                const desc = setupSlideDescInput.value.trim();
                const descFontFamily = setupSlideDescFontFamily.value;
                const descFontSize = parseInt(setupSlideDescFontSize.value) || 13;
                const descFontWeight = setupSlideDescFontWeight.value;
                const descColor = setupSlideDescColor.value || "#ffffff";

                const desc2 = setupSlideDesc2Input.value.trim();
                const desc2FontFamily = setupSlideDesc2FontFamily.value;
                const desc2FontSize = parseInt(setupSlideDesc2FontSize.value) || 12;
                const desc2FontWeight = setupSlideDesc2FontWeight.value;
                const desc2Color = setupSlideDesc2Color.value || "#ffffff";

                const video = setupSlideVideoUrlInput.value.trim();
                const videoFit = setupSlideVideoFitSelect.value;

                if (!title) {
                    alert("Lütfen slayt başlığı girin!");
                    return;
                }

                systemSlidesData[selectedSlideIdx] = {
                    title, titleAlign, titleFontFamily, titleFontSize, titleFontWeight, titleColor,
                    desc, descFontFamily, descFontSize, descFontWeight, descColor,
                    desc2, desc2FontFamily, desc2FontSize, desc2FontWeight, desc2Color,
                    video,
                    videoFit
                };

                saveSystemSlides(() => {
                    populateSlideDropdown();
                    setupSlideSelect.value = selectedSlideIdx;
                    alert("Slayt başarıyla kaydedildi!");
                });
            });

            function saveSystemSlides(callback) {
                fetch("/api/slides/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(systemSlidesData)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success && callback) {
                        callback();
                    }
                })
                .catch(err => console.error("Kaydetme hatası:", err));
            }

            loadSystemSlides();
        });
    </script>
</body>
</html>
